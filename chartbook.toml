is_publishable = true

[charts]

[dataframes]

[dataframes.ftsfr_he_kelly_manela_factors_monthly]
dataframe_name = "ftsfr_he_kelly_manela_factors_monthly"
short_description_df = "Monthly intermediary capital risk factors from He, Kelly, and Manela (2017)"
data_sources = ["he_kelly_manela"]
data_providers = ["Asaf Manela"]
need_to_contact_provider = ["no"]
data_on_pre_approved_list = ["No"]
links_to_data_providers = ["https://asaf.manela.org/papers/hkm/intermediarycapitalrisk/"]
topic_tags = ["factors", "intermediary", "capital"]
type_of_data_access = ["Public"]
data_license = "Public"
license_expiration_date = ""
provider_contact_info = ""
restriction_on_use = "No"
how_is_pulled = "Downloaded from Asaf Manela's website"
path_to_parquet_data = "./_data/ftsfr_he_kelly_manela_factors_monthly.parquet"
path_to_excel_data = ""
date_col = "ds"
dataframe_docs_str = """
## Monthly Intermediary Capital Risk Factors

This dataset contains monthly observations of the intermediary capital risk factors from He, Kelly, and Manela (2017).

### Columns

| Column | Description |
|--------|-------------|
| unique_id | Factor identifier |
| ds | Date |
| y | Factor value |

### Factors

- `intermediary_capital_ratio`: Capital ratio of primary dealers
- `intermediary_capital_risk_factor`: Innovation in capital ratio (the risk factor)
- `intermediary_value_weighted_investment_return`: Value-weighted investment return
- `intermediary_leverage_ratio_squared`: Squared leverage ratio
"""

