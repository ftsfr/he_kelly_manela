pipeline_name = "He-Kelly-Manela Factors"
pipeline_description = "Intermediary Capital Risk Factors from He, Kelly, and Manela (2017)"
lead_pipeline_developer = "Jeremiah Bejarano"
contributors = ["Jeremiah Bejarano"]
